version: '3.8'

services:
  backend:
    container_name: language-school-backend
    build:
      context: .
      dockerfile: language-school-back/Dockerfile
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_URL: ${DB_URL}
      SERVER_PORT: ${SERVER_PORT}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    networks:
      - language-school-network

#  frontend:
#    container_name: language-school-frontend
#    build:
#      context: .
#      dockerfile: language-school-app/Dockerfile
#    depends_on:
#      backend:
#        condition: service_started
#    networks:
#      - language-school-network

  minio:
    image: minio/minio:latest
    container_name: language-school-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server --console-address ":9001" /data
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - language-school-network

  nginx-proxy:
    image: nginx:latest
    container_name: language-school-nginx-proxy
    ports:
      - "80:80"    # HTTP
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    networks:
      - language-school-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "nginx", "-g", "daemon off;" ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio_data:
    driver: local

networks:
  language-school-network:
    driver: bridge