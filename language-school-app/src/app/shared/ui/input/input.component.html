<input
  [id]="id()"
  [attr.name]="name() || null"
  [type]="type()"
  [placeholder]="placeholder()"
  [attr.autocomplete]="autocomplete() || null"
  [required]="required()"
  [disabled]="disabled"
  [value]="value"
  (input)="handleInput($event)"
  (blur)="handleBlur()"
  [class]="'input ' + (class() || '')"
/>
