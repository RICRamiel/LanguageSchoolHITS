<section class="admin-section">
  <div class="admin-section__head">
    <h3 class="section-title">Преподаватели</h3>
    <app-button type="button" (click)="openAdd()" [disabled]="saving()">Добавить преподавателя</app-button>
  </div>
  @if (error()) {
    <p class="admin-error">{{ error() }}</p>
  }
  @if (showForm()) {
    <app-teacher-form
      [initialValue]="editingTeacher()"
      (save)="onSave($event)"
      (cancel)="onCancel()"
    />
  }
  @if (loading()) {
    <p class="admin-loading">Загрузка...</p>
  } @else {
  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ФИО</th>
          <th>Email</th>
          <th>Языки</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (t of teachers(); track t.id) {
          <tr>
            <td>{{ t.fullName }}</td>
            <td>{{ t.email }}</td>
            <td>{{ t.languages }}</td>
            <td class="admin-table__actions">
              <app-button type="button" class="outline small" (click)="openEdit(t)">Изменить</app-button>
              <app-button type="button" class="outline small" (click)="deleteTeacher(t.id)">Удалить</app-button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  }
</section>
