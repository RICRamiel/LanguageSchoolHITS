<app-card class="admin-form-card">
  <app-card-header>
    <app-card-title>{{ title }}</app-card-title>
  </app-card-header>
  <app-card-content>
    <form (ngSubmit)="onSubmit()" class="admin-form" [formGroup]="form">
      <div class="form-row">
        <app-label for="teacher-firstName">Имя</app-label>
        <app-input id="teacher-firstName" formControlName="firstName" placeholder="Имя" />
      </div>
      <div class="form-row">
        <app-label for="teacher-lastName">Фамилия</app-label>
        <app-input id="teacher-lastName" formControlName="lastName" placeholder="Фамилия" />
      </div>
      <div class="form-row">
        <app-label for="teacher-email">Email</app-label>
        <app-input id="teacher-email" type="email" formControlName="email" placeholder="email@school.com" />
      </div>
      @if (!isEdit) {
      <div class="form-row">
        <app-label for="teacher-password">Пароль</app-label>
        <app-input id="teacher-password" type="password" formControlName="password" placeholder="Пароль (мин. 8 символов)" />
      </div>
      }
      <div class="form-actions">
        <app-button type="submit" class="small">Сохранить</app-button>
        <app-button type="button" class="outline small" (click)="onCancel()">Отмена</app-button>
      </div>
    </form>
  </app-card-content>
</app-card>
