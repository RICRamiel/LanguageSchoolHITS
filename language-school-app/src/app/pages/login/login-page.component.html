<div class="login-page">
  <app-login-card>
    <form [formGroup]="form" (ngSubmit)="onLogin($event)" class="login-form">
      <div class="form-group">
        <app-label for="email">Email</app-label>
        <app-input
          id="email"
          type="email"
          placeholder="your@email.com"
          formControlName="email"
        ></app-input>
      </div>
      <div class="form-group">
        <app-label for="password">Пароль</app-label>
        <app-input
          id="password"
          type="password"
          placeholder="••••••••"
          formControlName="password"
        ></app-input>
      </div>
      @if (errorMessage) {
        <p class="login-error">{{ errorMessage }}</p>
      }
      <app-button type="submit" class="submit-btn" [disabled]="isLoading">
        @if (isLoading) {
          Вход...
        } @else {
          Войти
        }
      </app-button>
    </form>
  </app-login-card>
</div>
