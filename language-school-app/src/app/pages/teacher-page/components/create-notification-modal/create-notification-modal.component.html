<div class="modal-overlay" (click)="close.emit()">
  <section class="modal" (click)="$event.stopPropagation()">
    <button class="modal__close" type="button" (click)="close.emit()">×</button>
    <h3 class="modal__title">Создать уведомление</h3>
    <p class="modal__subtitle">Отправьте объявление студентам</p>

    <label class="modal__label" for="notify-title">Заголовок</label>
    <input
      id="notify-title"
      class="modal__input"
      type="text"
      placeholder="Например: Изменение расписания"
      [value]="title"
      (input)="title = $any($event.target).value"
    />

    <label class="modal__label" for="notify-content">Содержание</label>
    <textarea
      id="notify-content"
      class="modal__textarea"
      placeholder="Текст уведомления..."
      [value]="content"
      (input)="content = $any($event.target).value"
    ></textarea>

    <label class="modal__label" for="notify-group">Группа</label>
    <div class="modal__group-select">
      <button class="modal__group-trigger" type="button" (click)="toggleGroupList()">
        {{ groupQuery || 'Выберите группу' }}
      </button>
      @if (isGroupListOpen) {
        <div class="modal__group-panel">
          <input
            id="notify-group"
            class="modal__group-search"
            type="text"
            placeholder="Поиск по группам..."
            [value]="groupQuery"
            (input)="onGroupQueryInput($any($event.target).value)"
          />
          <div class="modal__group-options">
            @for (group of filteredGroups; track group.id) {
              <button class="modal__group-option" type="button" (click)="selectGroup(group)">
                <span>{{ group.name }}</span>
                <span class="modal__group-id">ID: {{ group.id }}</span>
              </button>
            }
            @if (!filteredGroups.length) {
              <p class="modal__group-empty">Ничего не найдено</p>
            }
          </div>
        </div>
      }
    </div>

    <div class="modal__actions">
      <button class="modal__btn modal__btn--ghost" type="button" (click)="close.emit()">Отменить</button>
      <button class="modal__btn modal__btn--primary" type="button" (click)="onSubmit()">Создать</button>
    </div>
  </section>
</div>
