<div class="tasks-section">
  <div class="tasks-section__header">
    <h3 class="tasks-section__title">Список заданий</h3>
    <button class="tasks-section__create" type="button" (click)="createTask.emit()">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      Создать задание
    </button>
  </div>

  <div class="tasks-list">
    @for (task of tasks(); track task.title) {
      <article class="task-card">
        <div class="task-card__top">
          <h4 class="task-card__title">{{ task.title }}</h4>
          <span class="task-card__group">{{ task.group }}</span>
        </div>

        <p class="task-card__description">{{ task.description }}</p>

        <div class="task-card__bottom">
          <div class="task-card__meta">
            <span class="meta-item">
              <svg class="meta-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M8 2V6M16 2V6M3 10H21" stroke="currentColor" stroke-width="2" />
              </svg>
              {{ task.dueDate }}
            </span>
            <button
              class="meta-item meta-item--action"
              type="button"
              (click)="openTaskDetails.emit({ title: task.title, section: 'submissions' })"
            >
              <svg class="meta-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M7 7H17M7 12H17M7 17H13M5 3H19C20.1 3 21 3.9 21 5V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              {{ task.submissions }}
            </button>
            <button
              class="meta-item meta-item--action"
              type="button"
              (click)="openTaskDetails.emit({ title: task.title, section: 'comments' })"
            >
              <svg class="meta-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M21 11.5C21 16.1944 16.9706 20 12 20C10.5238 20 9.12976 19.6647 7.9 19.0695L3 20L4.01613 15.4952C3.36972 14.3271 3 12.9998 3 11.5C3 6.80558 7.02944 3 12 3C16.9706 3 21 6.80558 21 11.5Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
              </svg>
              {{ task.comments }}
            </button>
          </div>

          <button
            class="task-card__details"
            type="button"
            (click)="openTaskDetails.emit({ title: task.title, section: 'overview' })"
          >
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M1 12C1 12 5 5 12 5C19 5 23 12 23 12C23 12 19 19 12 19C5 19 1 12 1 12Z"
                stroke="currentColor"
                stroke-width="2"
              />
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
            </svg>
            Подробнее
          </button>
        </div>
      </article>
    }
  </div>
</div>
