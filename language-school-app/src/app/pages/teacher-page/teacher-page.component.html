<div class="teacher-page">
  <app-header
    [fullName]="fullName"
    [email]="email"
    [badge]="badge"
    (logout)="onLogout()"
  />

  <main class="teacher-content">
    <section class="teacher-panel">
      <h2 class="teacher-panel__title">Панель учителя</h2>

      <app-tabs
        [tabs]="tabs"
        [activeId]="activeTab"
        (tabChange)="onTabChange($event)"
      />

      @if (activeTab === 'tasks') {
        <app-teacher-task-list
          [tasks]="tasks"
          (createTask)="onCreateTask()"
          (openTaskDetails)="onOpenTaskDetails($event)"
        />
      } @else {
        <app-teacher-notifications
          [notifications]="notifications"
          (createNotification)="openCreateNotificationModal()"
          (openNotification)="onOpenNotification($event)"
        />
      }
    </section>
  </main>

  @if (isNotificationModalOpen) {
    <app-create-notification-modal
      [groups]="groups"
      (close)="closeCreateNotificationModal()"
      (submit)="submitNotification($event)"
    />
  }

  @if (isTaskModalOpen) {
    <app-create-task-modal
      [groups]="groups"
      (close)="closeCreateTaskModal()"
      (submit)="submitTask($event)"
    />
  }

  @if (isTaskDetailsModalOpen && selectedTask) {
    <app-task-details-modal
      [task]="selectedTask"
      [activeSection]="selectedTaskSection"
      (submitComment)="onSubmitTaskComment($event)"
      (close)="closeTaskDetailsModal()"
    />
  }

  @if (isNotificationDetailsModalOpen && selectedNotification) {
    <app-notification-details-modal
      [notification]="selectedNotification"
      (close)="closeNotificationDetailsModal()"
    />
  }
</div>
