<div class="teacher-page">
  <app-header
    [fullName]="fullName"
    [email]="email"
    [badge]="badge"
    (logout)="onLogout()"
  />

  <main class="teacher-content">
    <section class="teacher-panel">
      <div class="teacher-panel__top">
        <h2 class="teacher-panel__title">Панель учителя</h2>
        <div class="teacher-panel__filter">
          <label class="teacher-panel__filter-label" for="teacher-group-filter">Группа</label>
          <select
            id="teacher-group-filter"
            class="teacher-panel__filter-select"
            [value]="selectedGroupFilter"
            (change)="onGroupFilterChange($any($event.target).value)"
          >
            <option value="all">Все группы</option>
            @for (group of (groups$ | async) ?? []; track group.id) {
              <option [value]="group.id">{{ group.name }}</option>
            }
          </select>
        </div>
      </div>

      <app-tabs
        [tabs]="(tabs$ | async) ?? []"
        [activeId]="activeTab"
        (tabChange)="onTabChange($event)"
      />

      @if (activeTab === 'tasks') {
        <app-teacher-task-list
          [tasks]="(tasks$ | async) ?? []"
          (createTask)="onCreateTask()"
          (openTaskDetails)="onOpenTaskDetails($event)"
        />
      } @else {
        <app-teacher-notifications
          [notifications]="(notifications$ | async) ?? []"
          (createNotification)="openCreateNotificationModal()"
          (openNotification)="onOpenNotification($event)"
        />
      }
    </section>
  </main>

  @if (isNotificationModalOpen) {
    <app-create-notification-modal
      [groups]="(groups$ | async) ?? []"
      (close)="closeCreateNotificationModal()"
      (submit)="submitNotification($event)"
    />
  }

  @if (isTaskModalOpen) {
    <app-create-task-modal
      [groups]="(groups$ | async) ?? []"
      (close)="closeCreateTaskModal()"
      (submit)="submitTask($event)"
    />
  }

  @if (isTaskDetailsModalOpen && selectedTask) {
    <app-task-details-modal
      [task]="selectedTask"
      [activeSection]="selectedTaskSection"
      (submitComment)="onSubmitTaskComment($event)"
      (downloadAttachment)="onDownloadTaskAttachment($event)"
      (close)="closeTaskDetailsModal()"
    />
  }

  @if (isNotificationDetailsModalOpen && selectedNotification) {
    <app-notification-details-modal
      [notification]="selectedNotification"
      [uploading]="notificationAttachmentUploading"
      (downloadAttachment)="onDownloadNotificationAttachment($event)"
      (uploadAttachment)="onAttachNotificationFile($event)"
      (close)="closeNotificationDetailsModal()"
    />
  }
</div>
