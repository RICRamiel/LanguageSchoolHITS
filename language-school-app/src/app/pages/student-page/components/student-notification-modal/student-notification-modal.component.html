<div class="modal-overlay" (click)="close.emit()">
  <section class="modal" (click)="$event.stopPropagation()">
    <button class="modal__close" type="button" (click)="close.emit()">×</button>
    <h3 class="modal__title">{{ notification().title }}</h3>
    <p class="modal__subtitle">{{ notification().author }} • {{ notification().dateTime }}</p>
    <p class="modal__text">{{ notification().text }}</p>
    <span class="modal__tag">{{ notification().tag }}</span>
  </section>
</div>
