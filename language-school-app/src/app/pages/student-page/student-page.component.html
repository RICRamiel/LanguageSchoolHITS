<div class="student-page">
  <app-header
    [fullName]="fullName"
    [email]="email"
    [badge]="groupName"
    (logout)="onLogout()"
  />

  <div class="student-page__content">
    <app-tabs
      [tabs]="tabs"
      [activeId]="activeTab"
      (tabChange)="onTabChange($event)"
    ></app-tabs>
    @if (activeTab === 'tasks') {
      <div class="task-list">
        @for (t of tasks; track t.id) {
          <app-task-card
            [title]="t.title"
            [pillText]="t.pillText"
            [pillVariant]="t.pillVariant"
            [teacher]="t.teacher"
            [description]="t.description"
            [dueText]="t.dueText"
            (details)="openTaskDetails(t.id)"
          />
        }
      </div>
    } @else {
      <app-notification-list
        [notifications]="notifications"
      />
    }
  </div>

  @if (isTaskDetailsModalOpen && selectedTask) {
    <app-student-task-details-modal
      [task]="selectedTask"
      [uploadInProgress]="uploadInProgress"
      [completeInProgress]="completeInProgress"
      [uploadedFileLink]="uploadedFileLink"
      [commentsLoading]="commentsLoading"
      [commentSubmitting]="commentSubmitting"
      [comments]="taskComments"
      (uploadFile)="onUploadTaskFile($event)"
      (completeTask)="onCompleteTask()"
      (submitComment)="onSubmitComment($event)"
      (close)="closeTaskDetailsModal()"
    />
  }

</div>
