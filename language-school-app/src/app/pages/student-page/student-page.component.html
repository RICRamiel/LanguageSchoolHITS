<div class="student-page">
  <app-header
    [fullName]="fullName"
    [email]="email"
    [badge]="groupName"
    (logout)="onLogout()"
  />

  <div class="student-page__content">
    <div class="student-page__top">
      <div class="student-page__top-spacer"></div>
      <div class="student-page__filter">
        <label class="student-page__filter-label" for="student-group-filter">Курс</label>
        <select
          id="student-group-filter"
          class="teacher-panel__filter-select"
          [value]="selectedGroupFilter"
          (change)="onGroupFilterChange($any($event.target).value)"
        >
          <option value="all">Все курсы</option>
          @for (group of groups; track group.id) {
            <option [value]="group.id">{{ group.name }}</option>
          }
        </select>
      </div>
    </div>

    <app-tabs
      [tabs]="tabs"
      [activeId]="activeTab"
      (tabChange)="onTabChange($event)"
    ></app-tabs>

    @if (activeTab === 'tasks') {
      <div class="task-list">
        @for (t of tasks; track t.id) {
          <app-task-card
            [title]="t.title"
            [pillText]="t.pillText"
            [pillVariant]="t.pillVariant"
            [teacher]="t.teacher"
            [description]="t.description"
            [dueText]="t.dueText"
            (details)="openTaskDetails(t.id)"
          />
        }
      </div>
    } @else {
      <app-notification-list
        [notifications]="notifications"
        (openNotification)="openNotificationDetails($event)"
        (downloadAttachment)="onDownloadNotificationAttachment($event)"
      />
    }
  </div>

  @if (isTaskDetailsModalOpen && selectedTask) {
    <app-student-task-details-modal
      [task]="selectedTask"
      [uploadInProgress]="uploadInProgress"
      [completeInProgress]="completeInProgress"
      [uploadedFileLink]="uploadedFileLink"
      [commentsLoading]="commentsLoading"
      [commentSubmitting]="commentSubmitting"
      [comments]="taskComments"
      (uploadFile)="onUploadTaskFile($event)"
      (completeTask)="onCompleteTask()"
      (submitComment)="onSubmitComment($event)"
      (close)="closeTaskDetailsModal()"
    />
  }

  @if (isNotificationDetailsModalOpen && selectedNotification) {
    <app-student-notification-modal
      [notification]="selectedNotification"
      (downloadAttachment)="onDownloadNotificationAttachment($event)"
      (close)="closeNotificationDetailsModal()"
    />
  }
</div>
